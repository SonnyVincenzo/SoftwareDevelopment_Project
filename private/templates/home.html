  <header class="topRow">
    <input class="search" type="text" spellcheck="true" maxlength="100"

    <form action="/user/username">
      <button id="standardButton" onclick=""> 
        Username
      </button>
    </form>

  <main>
    <article class="post-board">
      <article id=post>
        <h2 class="info"> Title 
        </h2>
        <h3 class="info"> By:
          <a class="info" href="/user/username">
            Username
          </a>
        </h3>
        <form>
          <button id="like" onclick="focus">
            &#10084;
          </button>
        </form>
      </article>
    </article>
  </main>
  <footer class="footer">
    <h2 class="info">
      Contact
